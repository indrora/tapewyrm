name: firmware

# Builds the vendored Greaseweazle firmware (with the Tapewyrm QIC layer grafted
# in) for the AT32F403 (v4.1) target, entirely in-tree.

on:
  push:
    paths: ["firmware/**", "tools/**", ".github/workflows/firmware.yml"]
  pull_request:
    paths: ["firmware/**", "tools/**", ".github/workflows/firmware.yml"]

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM GNU toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build firmware image (at32f4) in-tree
        # The portable packager builds the firmware with a pure-Python Intel-HEX
        # merge, so it needs only the ARM toolchain + make + uv (no srecord).
        run: uv run tools/package.py --skip-host --mcus at32f4
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tapewyrm-firmware-at32f4
          path: dist/**/firmware/*
