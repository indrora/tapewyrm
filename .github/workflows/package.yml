name: package

# Build the WHOLE project as one package (host wheel + firmware images) -> dist/.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM GNU toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build the full release (all MCUs + .upd + host wheel)
        run: uv run tools/package.py --dist
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: tapewyrm-package
          path: dist/tapewyrm-*.zip
